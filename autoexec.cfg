// Crosshair
cl_crosshairstyle "4"
cl_crosshaircolor "5"
cl_crosshaircolor_r "250"
cl_crosshaircolor_g "250"
cl_crosshaircolor_b "250"
cl_crosshairdot "0"
cl_crosshair_drawoutline "0"

sensitivity "1"
zoom_sensitivity_ratio "1"

// Other commands
cl_showloadout "1"

// Viewmodel settings
viewmodel_fov "68"
viewmodel_offset_x "1"
viewmodel_offset_y "0"
viewmodel_offset_z "-2"
viewmodel_preset_pos "2"

// HUD settings
hud_scaling "0.8"
cl_hud_background_alpha "0"
cl_radar_always_centered "0"
cl_radar_scale "0.5"
cl_radar_rotate "1"
cl_hud_color "5"

// FPS settings
fps_max "500"

// Grenade binds
bind "MWHEELUP" "slot7"
bind "c" "slot8"
bind "v" "slot10"

bind "MOUSE5" "+voicerecord"

// Clutch mute toggle - tap to silence everyone, tap again to restore
bind "MOUSE4" "toggle voice_enable 0 1"

// Jump and movement binds
bind "mwheeldown" "+jump"

// Crosshair styles
alias "cr1" "cl_crosshairgap -3; cl_crosshairthickness 0; cl_crosshairsize 2; cl_crosshairdot 0; cl_crosshair_drawoutline 0; cl_crosshaircolor 4"
bind "," "cr1"

alias "cr2" "cl_crosshairgap -4; cl_crosshair_drawoutline 0; cl_crosshairdot 0; cl_crosshairthickness 1; cl_crosshairsize 1;"
bind "." "cr2"

alias "laziz" "cl_crosshairsize 2; cl_crosshairthickness 0; cl_crosshairgap 0; cl_crosshair_drawoutline 1; cl_crosshaircolor 5"
bind "/" "laziz"

// Echo messages
echo ""
echo "========================================================"
echo "  ███████  ████████  ██       ██   ██████   ███    ██"
echo "       ██  ██         ██     ██   ██    ██  ████   ██"
echo "     ██    ███████     ██   ██    ██    ██  ██ ██  ██"
echo "   ██      ██           ██ ██     ██    ██  ██  ██ ██"
echo "  ███████  ████████      ███       ██████   ██   ████"
echo "========================================================"
echo "               > CONFIG LOADED SUCCESSFULLY <           "
echo "========================================================"
echo ""
